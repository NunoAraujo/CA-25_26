openapi: 3.0.3
info:
  title: Audio Journaling Analysis API
  version: 0.2.0
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health status of analysis service
      responses:
        "200":
          description: Service health
  /api/v1/analyze:
    post:
      summary: Submit audio for async analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobId, journalId, audioUrl, duration]
              properties:
                jobId:
                  type: string
                journalId:
                  type: string
                audioUrl:
                  type: string
                audioObjectKey:
                  type: string
                  description: Object key inside MinIO bucket used for secure server-side download
                callbackUrl:
                  type: string
                  description: Node callback endpoint for final analysis result persistence
                audioFormat:
                  type: string
                  example: wav
                duration:
                  type: number
                language:
                  type: string
                  example: pt-BR
      responses:
        "202":
          description: Accepted for processing
  /api/v1/analyze/{taskId}:
    get:
      summary: Query async analysis status/result
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  status:
                    type: string
                    enum: [queued, transcribing, analyzing, complete, failed]
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  transcription:
                    type: string
                    nullable: true
                  emotionVector:
                    $ref: "#/components/schemas/EmotionScores"
                  semanticScores:
                    $ref: "#/components/schemas/EmotionScores"
                    description: Raw text-model emotion scores before fusion
                  prosodyScores:
                    $ref: "#/components/schemas/EmotionScores"
                    description: Raw audio-model emotion scores before fusion
                  prosodyFeatures:
                    type: object
                    description: Low-level prosody features (pitch, energy, MFCC, etc.)
                  errorMessage:
                    type: string
                    nullable: true
components:
  schemas:
    EmotionScores:
      type: object
      properties:
        joy:
          type: number
          minimum: 0
          maximum: 1
        sadness:
          type: number
          minimum: 0
          maximum: 1
        anger:
          type: number
          minimum: 0
          maximum: 1
        anxiety:
          type: number
          minimum: 0
          maximum: 1
        calm:
          type: number
          minimum: 0
          maximum: 1
        energy:
          type: number
          minimum: 0
          maximum: 1
